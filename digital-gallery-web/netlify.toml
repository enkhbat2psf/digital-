## Netlify config (frontend)
## This app uses a Node backend elsewhere (Render/Railway/etc).
## Netlify only hosts the built static frontend from `dist/public`.

[build]
  base = "digital-gallery-web"
  command = "npm run build"
  publish = "dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://digital-production-92ef.up.railway.app/api/:splat"
  status = 200
  force = true

# Images are stored on the backend (/uploads or /manus-storage).
[[redirects]]
  from = "/uploads/*"
  to = "https://digital-production-92ef.up.railway.app/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/manus-storage/*"
  to = "https://digital-production-92ef.up.railway.app/manus-storage/:splat"
  status = 200
  force = true

# SPA fallback (wouter routes like /album/:id)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

