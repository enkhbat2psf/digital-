## Netlify config (frontend)
## - Build settings are configured in Netlify UI (base dir: digital-gallery-web/client)
## - This redirects API calls to your backend service.

[[redirects]]
  from = "/api/*"
  to = "https://digital-production-92ef.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://digital-production-92ef.up.railway.app/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/manus-storage/*"
  to = "https://digital-production-92ef.up.railway.app/manus-storage/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

